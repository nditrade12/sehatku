<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDI Sehat - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        .glass-header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .card-box {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(56, 189, 248, 0.1);
            border-radius: 16px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-box:hover {
            transform: translateY(-8px);
            border-color: #38bdf8;
            box-shadow: 0 20px 25px -5px rgba(56, 189, 248, 0.2);
            background: rgba(30, 41, 59, 0.8);
        }
        .icon-circle {
            transition: all 0.4s ease;
        }
        .card-box:hover .icon-circle {
            transform: scale(1.1) rotate(5deg);
        }
    </style>
</head>
<body class="min-h-screen">

    <header class="glass-header sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-sky-500 rounded-lg flex items-center justify-center font-bold text-white shadow-lg shadow-sky-500/50">N</div>
                <div class="text-2xl font-bold tracking-tight">
                    <span class="text-sky-400">NDI</span> <span class="text-white">sehat</span>
                </div>
            </div>
            
            <div class="bg-slate-800/50 px-4 py-2 rounded-xl border border-white/5 text-right">
                <div id="clock" class="text-xl font-mono font-bold text-sky-400 leading-none">00:00:00</div>
                <div id="date" class="text-[10px] text-slate-400 uppercase tracking-widest mt-1">Memuat Tanggal...</div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 mt-10">
        <div class="mb-8 border-l-4 border-sky-500 pl-4">
            <h1 class="text-2xl font-bold text-white">Menu Utama</h1>
            <p class="text-slate-400 text-sm italic">Monitoring kesehatan dan aktivitas harian secara real-time.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <a href="kesehatan.html" class="card-box h-52 flex flex-col items-center justify-center group cursor-pointer p-6 text-center">
                <div class="icon-circle w-14 h-14 bg-emerald-500/10 rounded-2xl flex items-center justify-center mb-4 group-hover:bg-emerald-500 transition-all shadow-inner">
                    <span class="text-2xl">❤️</span>
                </div>
                <h3 class="text-emerald-400 font-bold text-lg tracking-wide uppercase group-hover:text-white transition-colors">Kesehatan Dalaman</h3>
                <p class="text-xs text-slate-500 mt-2 group-hover:text-slate-300 transition-colors">Pantau Organ & Nutrisi Tubuh</p>
            </a>

            <a href="push-up.html" class="card-box h-52 flex flex-col items-center justify-center group cursor-pointer p-6 text-center">
                <div class="icon-circle w-14 h-14 bg-sky-500/10 rounded-2xl flex items-center justify-center mb-4 group-hover:bg-sky-500 transition-all shadow-inner">
                    <span class="text-2xl">💪</span>
                </div>
                <h3 class="text-white font-bold text-lg tracking-wide uppercase">Push Up</h3>
                <p class="text-xs text-slate-500 mt-2 group-hover:text-slate-300 transition-colors">Latihan Kekuatan Dada & Lengan</p>
            </a>

            <a href="sit-up.html" class="card-box h-52 flex flex-col items-center justify-center group cursor-pointer p-6 text-center">
                <div class="icon-circle w-14 h-14 bg-orange-500/10 rounded-2xl flex items-center justify-center mb-4 group-hover:bg-orange-500 transition-all shadow-inner">
                    <span class="text-2xl">🧘</span>
                </div>
                <h3 class="text-white font-bold text-lg tracking-wide uppercase">Sit Up</h3>
                <p class="text-xs text-slate-500 mt-2 group-hover:text-slate-300 transition-colors">Latihan Pembentukan Otot Perut</p>
            </a>

            <a href="squat.html" class="card-box h-52 flex flex-col items-center justify-center group cursor-pointer p-6 text-center">
                <div class="icon-circle w-14 h-14 bg-indigo-500/10 rounded-2xl flex items-center justify-center mb-4 group-hover:bg-indigo-500 transition-all shadow-inner">
                    <span class="text-2xl">🦵</span>
                </div>
                <h3 class="text-white font-bold text-lg tracking-wide uppercase">Squat</h3>
                <p class="text-xs text-slate-500 mt-2 group-hover:text-slate-300 transition-colors">Latihan Kekuatan Kaki & Panggul</p>
            </a>

        </div>
    </main>

    <script>
        function updateDateTime() {
            const now = new Date();
            
            // Jam
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;

            // Tanggal Indonesia
            const options = { 
                weekday: 'long', 
                day: '2-digit', 
                month: 'long', 
                year: 'numeric' 
            };
            document.getElementById('date').textContent = now.toLocaleDateString('id-ID', options);
        }

        // Jalankan waktu real-time
        setInterval(updateDateTime, 1000);
        updateDateTime();
    </script>
</body>
</html>
