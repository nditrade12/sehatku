<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDI Fitness Level Pro</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #020617;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --accent-green: #10b981;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px; margin: 0; min-height: 100vh;
        }
        .container {
            width: 100%; max-width: 480px;
            background: var(--card);
            padding: 2rem; border-radius: 30px;
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tabs {
            display: flex; gap: 8px; margin-bottom: 20px;
            background: rgba(15, 23, 42, 0.8); padding: 5px; border-radius: 15px;
        }
        .tab-btn {
            flex: 1; padding: 12px; border: none; background: transparent;
            color: #94a3b8; cursor: pointer; border-radius: 10px; font-weight: 700;
            transition: 0.3s;
        }
        .tab-btn.active { background: var(--secondary); color: #020617; }

        .progress-box { margin-bottom: 25px; }
        .bar-bg { height: 10px; background: rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--secondary), var(--primary)); width: 0%; transition: 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        .view-section { display: none; }
        .view-section.active { display: block; }

        label { font-size: 0.85rem; color: #94a3b8; display: block; margin-bottom: 8px; }
        select, input {
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(15, 23, 42, 0.9); color: white; margin-bottom: 20px; outline: none; font-size: 1rem;
        }
        
        .btn-generate {
            width: 100%; padding: 16px; background: linear-gradient(135deg, var(--secondary), var(--primary));
            border: none; border-radius: 12px; color: #020617; font-weight: 800; cursor: pointer;
            letter-spacing: 1px; transition: 0.3s;
        }
        .btn-generate:hover { transform: scale(1.02); filter: brightness(1.1); }

        .list { max-height: 400px; overflow-y: auto; padding-right: 8px; }
        .item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px; background: rgba(255,255,255,0.04); margin-bottom: 12px;
            border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);
        }
        .item.done { border-color: var(--accent-green); background: rgba(16, 185, 129, 0.1); }

        .check-btn {
            background: transparent; border: 2px solid var(--primary); color: var(--primary);
            padding: 8px 18px; border-radius: 10px; cursor: pointer; font-weight: 800;
        }
        .check-btn.active { background: var(--primary); color: #020617; }
        
        .reset-btn { text-align: center; display: block; margin-top: 20px; color: #ff5555; cursor: pointer; font-size: 0.8rem; font-weight: 600; text-decoration: none; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: var(--primary); margin-top: 0; letter-spacing: 2px;">NDI WORKOUT</h2>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="changeTab('pushup', this)">PUSH UP</button>
        <button class="tab-btn" onclick="changeTab('squat', this)">SQUAT</button>
        <button class="tab-btn" onclick="changeTab('situp', this)">SIT UP</button>
    </div>

    <div class="progress-box" id="prog-ui" style="display:none;">
        <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 8px;">
            <span id="label-stat">Progres Latihan</span>
            <span id="pct-val">0%</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" id="bar-fill"></div></div>
    </div>

    <div id="setup-view" class="view-section active">
        <label>Target Hari Ke-1</label>
        <input type="number" id="start-reps" value="10">
        
        <label>Durasi Challenge (Hari)</label>
        <input type="number" id="total-days" value="30">

        <label>Pilih Level Kenaikan</label>
        <select id="level-select">
            <option value="2">Rendah (+2 Reps/Hari)</option>
            <option value="5" selected>Sedang (+5 Reps/Hari)</option>
            <option value="10">Tinggi (+10 Reps/Hari)</option>
        </select>
        
        <button class="btn-generate" onclick="generatePlan()">GENERATE PLAN</button>
    </div>

    <div id="list-view" class="view-section">
        <div class="list" id="exercise-list"></div>
        <a class="reset-btn" onclick="resetCurrent()">Hapus & Reset Program Ini</a>
    </div>
</div>

<script>
    let activeTab = 'pushup';

    window.onload = () => loadData();

    function changeTab(type, btn) {
        activeTab = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadData();
    }

    function generatePlan() {
        const start = parseInt(document.getElementById('start-reps').value);
        const days = parseInt(document.getElementById('total-days').value);
        const increment = parseInt(document.getElementById('level-select').value);

        let plan = [];
        for(let i = 1; i <= days; i++) {
            plan.push({
                day: i,
                reps: start + ((i - 1) * increment),
                status: false
            });
        }
        localStorage.setItem('ndi_fit_' + activeTab, JSON.stringify(plan));
        loadData();
    }

    function loadData() {
        const data = JSON.parse(localStorage.getItem('ndi_fit_' + activeTab));
        const setup = document.getElementById('setup-view');
        const list = document.getElementById('list-view');
        const prog = document.getElementById('prog-ui');

        if(!data) {
            setup.classList.add('active');
            list.classList.remove('active');
            prog.style.display = 'none';
        } else {
            setup.classList.remove('active');
            list.classList.add('active');
            prog.style.display = 'block';
            renderUI(data);
        }
    }

    function renderUI(data) {
        const container = document.getElementById('exercise-list');
        container.innerHTML = '';
        let completed = 0;

        data.forEach((item, index) => {
            if(item.status) completed++;
            const div = document.createElement('div');
            div.className = `item ${item.status ? 'done' : ''}`;
            div.innerHTML = `
                <div>
                    <span style="color:var(--primary); font-weight:800;">HARI ${item.day}</span><br>
                    <span style="font-size: 0.9rem; opacity: 0.8;">Target: ${item.reps} Repetisi</span>
                </div>
                <button class="check-btn ${item.status ? 'active' : ''}" onclick="toggleStatus(${index})">
                    ${item.status ? 'LULUS' : 'SELESAI'}
                </button>
            `;
            container.appendChild(div);
        });

        // Update Progress Bar
        const percent = Math.round((completed / data.length) * 100);
        document.getElementById('bar-fill').style.width = percent + '%';
        document.getElementById('pct-val').innerText = percent + '%';
        document.getElementById('label-stat').innerText = `Progres ${activeTab.toUpperCase()}`;
    }

    function toggleStatus(index) {
        let data = JSON.parse(localStorage.getItem('ndi_fit_' + activeTab));
        data[index].status = !data[index].status;
        localStorage.setItem('ndi_fit_' + activeTab, JSON.stringify(data));
        renderUI(data);
    }

    function resetCurrent() {
        if(confirm(`Yakin ingin menghapus riwayat ${activeTab.toUpperCase()}?`)) {
            localStorage.removeItem('ndi_fit_' + activeTab);
            loadData();
        }
    }
</script>
</body>
</html>
